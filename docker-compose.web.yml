version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookmark-backend
    expose:
      - "6005"
    env_file:
      - ./backend/.env.prod
    networks:
      - bookmark-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookmark-frontend
    expose:
      - "3002"
    env_file:
      - ./frontend/.env.prod
    environment:
      INTERNAL_API_URL: http://backend:6005/api/v1
    depends_on:
      - backend
    networks:
      - bookmark-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: bookmark-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.active.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - bookmark-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: bookmark-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    networks:
      - bookmark-network

networks:
  bookmark-network:
    driver: bridge
